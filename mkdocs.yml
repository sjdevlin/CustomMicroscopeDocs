site_name: Temika Microscope Documentation
site_description: Living technical documentation for the Temika microscope.
site_url: https://sjdevlin.github.io/CustomMicroscopeDocs/
repo_url: https://github.com/sjdevlin/CustomMicroscopeDocs
repo_name: sjdevlin/CustomMicroscopeDocs
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/other/temika_logo.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Overview: overview.md
  - Operating Via The User Interface:
      - Basic Operation: operating-via-user-interface/basic-operation.md
      - Advanced Controls: operating-via-user-interface/advanced-controls.md
  - Programmatic Control:
      - XML Script: programmatic-control/xml-script.md
      - Software: programmatic-control/software.md
      - Templates: programmatic-control/templates.md
  - Troubleshooting: troubleshooting.md
  - Maintenance: maintenance.md
  - Documentation Maintenance: documentation-maintenance.md
